<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fareharbor Portal - Slidable Sidebar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --white: #ffffff;
            --bg-light: #faf9f6;
            --font-main: "Google Sans", "Outfit", sans-serif;
            --sidebar-width: 320px;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-light);
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: #3c4043;
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--white);
            height: 100vh;
            border-right: 1px solid rgba(197, 160, 89, 0.1);
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.02);
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        /* Collapsed State */
        .sidebar.collapsed {
            margin-left: calc(var(--sidebar-width) * -1);
        }

        /* --- Sliding Toggle Button --- */
        .toggle-btn {
            position: absolute;
            right: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 30px;
            height: 60px;
            background: var(--primary-gold);
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            border: none;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .toggle-btn:hover {
            background: #b38f4d;
            right: -18px;
        }

        #clock {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-gold);
            margin-bottom: 20px;
            text-align: center;
            background: #fcfaf0;
            padding: 8px;
            border-radius: 50px;
        }

        h2 { font-size: 1.2rem; margin-bottom: 20px; white-space: nowrap; }

        .input-group { margin-bottom: 12px; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: var(--primary-gold);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 10px;
            background: #f8f9fa;
            border: 1px solid #dadce0;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        .search-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary-gold);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        /* --- History Section --- */
        .history-container {
            margin-top: 30px;
            overflow-y: auto;
            flex-grow: 1;
            min-height: 0;
        }

        .history-title { font-size: 0.7rem; font-weight: 600; color: #9aa0a6; text-transform: uppercase; margin-bottom: 10px; display: block; }

        .history-item {
            background: #fdfdfd;
            border: 1px solid #f1f3f4;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .history-item:hover { border-color: var(--primary-gold); }
        .history-link { display: block; color: var(--primary-gold); font-size: 0.6rem; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 4px;}

        /* --- Main Content --- */
        .main-content {
            flex-grow: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
            transition: all 0.4s ease;
        }

        #calendarWrapper {
            width: 100%;
            height: 100%;
            display: none;
            position: relative;
        }

        #placeholderText {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #9aa0a6;
            background: var(--bg-light);
        }

        .loader {
            position: absolute;
            inset: 0;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        iframe { width: 100%; height: 100%; border: none; }

        .footer-sidebar {
            margin-top: auto;
            text-align: center;
            padding-top: 15px;
            border-top: 1px solid #eee;
            background: white;
        }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <button class="toggle-btn" onclick="toggleSidebar()" id="toggleBtn">❮</button>

    <div id="clock">00:00:00</div>
    <h2>Booking Portal</h2>
    
    <div class="input-group">
        <label>Supplier Name</label>
        <input type="text" id="supplierName" placeholder="lookaroundtours">
    </div>
    
    <div class="input-group">
        <label>Item ID</label>
        <input type="text" id="itemId" placeholder="576042">
    </div>

    <button class="search-btn" onclick="handleSearch()">Search Availability</button>

    <div class="history-container">
        <span class="history-title">History</span>
        <div id="historyList"></div>
    </div>

    <div class="footer-sidebar">
        <img src="unnamed.png" alt="Sachin" class="profile-img">
        <div style="font-size: 0.75rem; font-weight: 600;">Sachin Makadia</div>
    </div>
</aside>

<main class="main-content">
    <div id="placeholderText">
        <p>← Use the sidebar to search for a product</p>
    </div>

    <div id="calendarWrapper">
        <div id="loader" class="loader"><div class="spinner"></div></div>
        <iframe id="calendarFrame" src=""></iframe>
    </div>
</main>

<script>
    // 1. Sidebar Toggle Logic
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('toggleBtn');
        
        sidebar.classList.toggle('collapsed');
        
        if (sidebar.classList.contains('collapsed')) {
            btn.innerHTML = '❯'; // Point right when closed
        } else {
            btn.innerHTML = '❮'; // Point left when open
        }
    }

    // 2. Clock Logic
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 3. Booking Logic
    window.onload = displayHistory;

    function handleSearch() {
        const supplier = document.getElementById('supplierName').value.trim();
        const id = document.getElementById('itemId').value.trim();
        
        if (supplier && id) {
            const url = `https://fareharbor.com/embeds/book/${supplier}/items/${id}/calendar/2026/4/?full-items=yes`;
            saveHistory(supplier, id, url);
            launchCalendar(url);
        }
    }

    function launchCalendar(url) {
        document.getElementById('placeholderText').style.display = 'none';
        const wrapper = document.getElementById('calendarWrapper');
        const frame = document.getElementById('calendarFrame');
        const loader = document.getElementById('loader');

        wrapper.style.display = 'block';
        loader.style.display = 'flex';
        frame.src = url;

        frame.onload = () => loader.style.display = 'none';
    }

    function saveHistory(supplier, id, url) {
        let history = JSON.parse(localStorage.getItem('fh_history_slide')) || [];
        history = history.filter(item => item.id !== id);
        history.unshift({ supplier, id, url, time: new Date().toLocaleTimeString() });
        if (history.length > 5) history.pop();
        localStorage.setItem('fh_history_slide', JSON.stringify(history));
        displayHistory();
    }

    function displayHistory() {
        const history = JSON.parse(localStorage.getItem('fh_history_slide')) || [];
        const container = document.getElementById('historyList');
        container.innerHTML = history.map(item => `
            <div class="history-item" onclick="quickLoad('${item.supplier}', '${item.id}', '${item.url}')">
                <strong>${item.supplier}</strong>
                <span>ID: ${item.id}</span>
                <a href="${item.url}" class="history-link" target="_blank" onclick="event.stopPropagation()">${item.url}</a>
            </div>
        `).join('');
    }

    function quickLoad(supplier, id, url) {
        document.getElementById('supplierName').value = supplier;
        document.getElementById('itemId').value = id;
        launchCalendar(url);
    }
</script>

</body>
</html>
